name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify dist content
        run: |
          echo "PWD:"
          pwd

          echo "List repo root:"
          ls -la

          echo "List dist/:"
          ls -la dist || true

          echo "Check dist/index.html exists:"
          test -f dist/index.html && echo "OK: dist/index.html exists" || (echo "ERROR: dist/index.html missing" && exit 1)

          echo "List dist/assets (if any):"
          ls -la dist/assets || true

      - name: Show dist/index.html header (must reference /assets/)
        run: |
          echo "---- dist/index.html (first 40 lines) ----"
          sed -n '1,40p' dist/index.html
          echo "---- grep assets ----"
          grep -n "assets" dist/index.html || true
          echo "---- grep /src/main ----"
          grep -n "/src/main.tsx" dist/index.html && (echo "ERROR: dist index is dev index" && exit 1) || true

      - name: Create and inspect dist.zip (debug)
        run: |
          (cd dist && zip -r ../dist.zip .)
          unzip -l dist.zip | head -n 50

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
