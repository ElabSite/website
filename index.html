    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get("p"); // ex: "/tarifs"
        var h = params.get("h"); // ex: "#simulateur"

        if (p) {
          // ✅ site servi à la racine : pas de /website
          var newUrl = window.location.origin + decodeURIComponent(p);

          if (h) newUrl += decodeURIComponent(h);

          window.history.replaceState(null, "", newUrl);
        }
      })();
    </script>
