<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Redirecting…</title>
    <script>
      // SPA fallback for GitHub Pages (subdirectory-compatible)
      // Redirect /<repo>/some/path -> /<repo>/?p=/some/path&h=<hash>
      (function () {
        var l = window.location;

        // Example:
        // l.pathname = "/website/tarifs"
        // base = "/website"
        var parts = l.pathname.split("/");
        var base = "/" + (parts[1] || "");

        var pathAfterBase = l.pathname.slice(base.length); // "/tarifs"
        if (!pathAfterBase) pathAfterBase = "/";

        var redirectUrl =
          l.protocol +
          "//" +
          l.host +
          base +
          "/?p=" +
          encodeURIComponent(pathAfterBase) +
          (l.search ? "&q=" + encodeURIComponent(l.search) : "") +
          (l.hash ? "&h=" + encodeURIComponent(l.hash) : "");

        l.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
