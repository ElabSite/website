<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Redirecting…</title>
    <script>
      // SPA fallback for GitHub Pages when the app is served from the domain root.
      // Redirect /some/path -> /?p=/some/path&h=<hash>
      (function () {
        var l = window.location;

        var path = l.pathname || "/";
        if (!path.startsWith("/")) path = "/" + path;

        var redirectUrl =
          l.protocol +
          "//" +
          l.host +
          "/?p=" +
          encodeURIComponent(path) +
          (l.search ? "&q=" + encodeURIComponent(l.search) : "") +
          (l.hash ? "&h=" + encodeURIComponent(l.hash) : "");

        l.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
